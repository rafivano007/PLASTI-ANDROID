name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g @capacitor/cli@6 && npm install @capacitor/core@6 @capacitor/android@6 typescript

      - name: Create assets directory and required files
        run: |
          mkdir -p android/app/src/main/assets/public
          echo '{}' > android/app/src/main/assets/capacitor.config.json
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;34.0.0" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plasti-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
